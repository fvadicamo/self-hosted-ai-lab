# OpenClaw instance registry
# Format: USERNAME PORT  # optional comment
#
# Naming: oc-<name> (lowercase, alphanumeric, hyphens)
# Ports:  *789, increment by 1000 (18789, 19789, 20789, ...)
#
# Add one line per instance, then run:
#   openclaw-provision.sh batch /srv/openclaw-instances.conf setup
#   # ... manual onboarding for each instance ...
#   openclaw-provision.sh batch /srv/openclaw-instances.conf service

oc-acme  18789   # Acme Corp
oc-beta  19789   # Beta Inc
